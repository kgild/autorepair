function complaintLookup(year,make,model,complaint){
  if(!year||!make||!model||!complaint) return null;
  const yn=parseInt(year),cl=complaint.toLowerCase();
  let best=null,bs=-1;
  for(const e of COMPLAINT_DB){
    const m=e.match; let s=0;
    if(m.make&&m.make.toLowerCase()!==make.toLowerCase()) continue;
    if(m.make) s+=50;
    if(m.model&&m.model.toLowerCase()!==model.toLowerCase()) continue;
    if(m.model) s+=50;
    if(m.year_min&&yn<m.year_min) continue;
    if(m.year_max&&yn>m.year_max) continue;
    if(m.year_min||m.year_max) s+=30;
    if(m.keywords){const mt=m.keywords.filter(k=>cl.includes(k.toLowerCase()));if(mt.length===0) continue;s+=mt.length*10;}
    if(s>bs){bs=s;best=e;}
  }
  return best;
}
function fluidLookup(make,model){
  if(!make||!model) return null;
  const key=(make+" "+model).toLowerCase().trim();
  for(const k of Object.keys(FLUID_DB)){if(key.includes(k)||k===key) return FLUID_DB[k];}
  return null;
}
function torqueLookup(c){
  const key=c.toLowerCase().trim();
  for(const k of Object.keys(TORQUE_DB)){if(key.includes(k)||k.includes(key)) return TORQUE_DB[k];}
  return null;
}
function extractJSON(text){
  if(!text) throw new Error("Empty response");
  try{return JSON.parse(text);}catch{}
  let c=text.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  try{return JSON.parse(c);}catch{}
  const s=c.indexOf("{"),e=c.lastIndexOf("}");
  if(s!==-1&&e>s){try{return JSON.parse(c.slice(s,e+1));}catch{}}
  throw new Error("Could not parse AI response");
}
async function callClaude(prompt,sys){
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,system:sys+"\n\nReturn ONLY raw JSON.",messages:[{role:"user",content:prompt}]})
  });
  if(!res.ok) throw new Error(`API ${res.status}`);
  const d=await res.json();
  if(d.error) throw new Error(d.error.message);
  return d.content?.[0]?.text||"";
}

}

function ToolFinder(){
  const [job,setJob]=useState(""); const [year,setYear]=useState(""); const [make,setMake]=useState(""); const [model,setModel]=useState("");
  const [loading,setLoading]=useState(false); const [result,setResult]=useState(null);
  const cc={Basic:B,Specialty:A,Power:R,Safety:G};
  async function handle(){
    if(!job.trim()) return; setLoading(true); setResult(null);
    const v=year&&make&&model?`${year} ${make} ${model}`:"generic vehicle";
    try{
      const raw=await callClaude(`Job: ${job}\nVehicle: ${v}`,
        `Expert automotive technician. JSON: {"job_title":"...","overview":"...","skill_level":"Beginner|Intermediate|Advanced","required_tools":[{"name":"...","category":"Basic|Specialty|Power|Safety","spec":"...","why":"..."}],"specialty_tools":[{"name":"...","why":"...","rental_available":true}],"consumables":["..."],"safety_gear":["..."],"pro_tips":["..."],"when_to_call_pro":"..."}`);
      setResult(extractJSON(raw));
    }catch(e){setResult({error:true,msg:e.message});}
    setLoading(false);
  }
  return(
    <div>
      <div style={{marginBottom:14}}><label style={S.lbl}>JOB / REPAIR</label><input style={S.inp} placeholder="e.g. brake pad replacement, timing belt, water pump" value={job} onChange={e=>setJob(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()}/></div>
      <VSel year={year} setYear={setYear} make={make} setMake={setMake} model={model} setModel={setModel}/>
      <button onClick={handle} disabled={loading||!job.trim()} style={S.btn}>{loading?"BUILDING...":"▶ BUILD TOOL LIST"}</button>
      {loading&&<Spin label="Building tool list..."/>}
      {result?.error&&<Err msg={result.msg}/>}
      {result&&!result.error&&<>
        <Card accent={A}>
          <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10,alignItems:"flex-start"}}>
            <div><div style={{color:"#fff",fontSize:18,fontWeight:700,marginBottom:4}}>{result.job_title}</div><p style={{...S.body,margin:0}}>{result.overview}</p></div>
            <span style={{...S.badge,background:"#1a1a2a",color:"#8080e8",fontSize:11}}>{result.skill_level}</span>
          </div>
        </Card>
        <Card title="REQUIRED TOOLS" accent={B}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>{Object.entries(cc).map(([cat,col])=><span key={cat} style={{...S.badge,background:`${col}22`,color:col}}>{cat}</span>)}</div>
          {result.required_tools?.map((t,i)=>(
            <div key={i} style={{display:"flex",gap:14,marginBottom:12,paddingBottom:12,borderBottom:"1px solid #1a1a1a"}}>
              <div style={{width:8,flexShrink:0,background:cc[t.category]||"#555",borderRadius:2}}/>
              <div><div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}><span style={{color:"#fff",fontFamily:"monospace",fontSize:13}}>{t.name}</span>{t.spec&&<span style={{color:"#666",fontSize:11,fontFamily:"monospace"}}>{t.spec}</span>}</div><div style={S.body}>{t.why}</div></div>
            </div>
          ))}
        </Card>
        {result.specialty_tools?.length>0&&<Card title="SPECIALTY TOOLS" accent={A}>{result.specialty_tools.map((t,i)=>(
          <div key={i} style={{display:"flex",gap:14,marginBottom:12}}>
            <div style={{width:8,flexShrink:0,background:A,borderRadius:2}}/>
            <div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#fff",fontFamily:"monospace",fontSize:13}}>{t.name}</span><span style={{...S.badge,background:t.rental_available?"#0a2a2a":"#2a1a0a",color:t.rental_available?T:A}}>{t.rental_available?"RENT":"BUY"}</span></div><div style={S.body}>{t.why}</div></div>
          </div>
        ))}</Card>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Card title="CONSUMABLES" accent={P}><ul style={{paddingLeft:18,margin:0}}>{result.consumables?.map((c,i)=><li key={i} style={{...S.body,marginBottom:4}}>{c}</li>)}</ul></Card>
          <Card title="SAFETY GEAR" accent={G}><ul style={{paddingLeft:18,margin:0}}>{result.safety_gear?.map((s,i)=><li key={i} style={{...S.body,marginBottom:4}}>{s}</li>)}</ul></Card>
        </div>
        <Card title="PRO TIPS" accent={Y}>{result.pro_tips?.map((t,i)=><div key={i} style={{display:"flex",gap:10,marginBottom:8}}><span style={{color:Y,flexShrink:0}}>✦</span><span style={S.body}>{t}</span></div>)}</Card>
        <Card title="WHEN TO CALL A PRO" accent={R}><p style={{...S.body,color:"#ff8080",margin:0}}>{result.when_to_call_pro}</p></Card>
      </>}
    </div>
  );
}

function VINLookup(){
  const [vin,setVin]=useState(""); const [touched,setTouched]=useState(false);
  const cv=vin.toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,17);
  const ok=cv.length===17;
  const svcs=[
    {name:"CARFAX",color:R,badge:"$45",desc:"Comprehensive: accidents, service records, ownership, title issues.",btn:"RUN CARFAX →",url:`https://www.carfax.com/vehicle/${cv}`},
    {name:"AUTOCHECK",color:B,badge:"$25",desc:"Strong on auction/Manheim records and odometer rollback detection.",btn:"RUN AUTOCHECK →",url:`https://www.autocheck.com/vehiclehistory/?vin=${cv}`},
    {name:"NHTSA RECALLS",color:G,badge:"FREE",desc:"Government database of all open safety recalls by VIN.",btn:"CHECK RECALLS →",url:`https://www.nhtsa.gov/vehicle/${cv}/complaints`},
    {name:"VIN DECODER",color:Y,badge:"FREE",desc:"Decode year, make, model, engine, plant, and production sequence.",btn:"DECODE VIN →",url:`https://www.vindecoderz.com/EN/check-lookup/${cv}`},
  ];
  return(
    <div>
      <div style={{marginBottom:14,padding:"12px 16px",background:"#1a1a2a",border:"1px solid #2a2a4a",borderRadius:4}}>
        <div style={{color:"#8080e8",fontFamily:"monospace",fontSize:11,letterSpacing:3,marginBottom:4}}>VEHICLE HISTORY LOOKUP</div>
        <div style={{...S.body,fontSize:12}}>Check for accidents, recalls, title issues, and ownership history before buying used.</div>
      </div>
      <div style={{marginBottom:20}}>
        <label style={S.lbl}>VIN (17 CHARACTERS)</label>
        <input style={{...S.inp,textTransform:"uppercase",letterSpacing:2,fontSize:16}} placeholder="1HGBH41JXMN109186" value={vin} onChange={e=>{setVin(e.target.value);setTouched(false);}} maxLength={20}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
          <div style={{fontFamily:"monospace",fontSize:11,color:ok?G:touched&&!ok?R:"#444"}}>{cv.length}/17 {ok?"✓":touched&&!ok?"— must be 17 chars":""}</div>
          <div style={{fontFamily:"monospace",fontSize:10,color:"#444"}}>Found on dash, door jamb, or title</div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {svcs.map(svc=>(
          <div key={svc.name} style={{background:"#0d0d0d",border:`1px solid ${svc.color}44`,borderRadius:4,padding:16,position:"relative"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:svc.color,borderRadius:"4px 4px 0 0"}}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8,paddingTop:4}}>
              <span style={{color:svc.color,fontFamily:"monospace",fontSize:13,fontWeight:700}}>{svc.name}</span>
              <span style={{...S.badge,background:`${svc.color}22`,color:svc.color}}>{svc.badge}</span>
            </div>
            <p style={{...S.body,fontSize:12,marginBottom:14}}>{svc.desc}</p>
            <button onClick={()=>{if(!ok){setTouched(true);return;}window.open(svc.url,"_blank");}} style={{...S.btn,background:svc.color,color:"#000",padding:"8px 16px",fontSize:10,marginBottom:0}}>{svc.btn}</button>
          </div>
        ))}
      </div>
      <Card title="PRO TIPS" accent={A} style={{marginTop:12}}>
        {["Always run BOTH a recall check and a paid history report.","Verify the VIN in 3 places: dash, door jamb, and title.","Carfax misses ~40% of accidents — only shows what was reported to insurance.","If a seller won't share the VIN before viewing, walk away."].map((t,i)=>(
          <div key={i} style={{display:"flex",gap:10,marginBottom:8}}><span style={{color:A,flexShrink:0}}>✦</span><span style={S.body}>{t}</span></div>
        ))}
      </Card>
    </div>
  );
}

const TABS=[{l:"🔧 COMPLAINT"},{l:"⚡ DTC CODE"},{l:"🔩 TORQUE"},{l:"🛢 FLUIDS"},{l:"🧾 PARTS $"},{l:"🪛 TOOLS"},{l:"🔍 VIN"}];

function App(){
  const [tab,setTab]=useState(0);
  const Tabs=[ComplaintLookup,DTCLookup,TorqueSpecs,FluidCapacity,PartsEstimator,ToolFinder,VINLookup];
  const Active=Tabs[tab];
  return(
    <div style={{minHeight:"100vh",background:"#080808",fontFamily:"'Courier New',monospace"}}>
      <div style={{borderBottom:"1px solid #1a1a1a",background:"#0a0a0a"}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"22px 24px 0"}}>
          <div style={{fontSize:11,letterSpacing:4,color:A,fontWeight:700,marginBottom:4}}>AUTO REPAIR ASSISTANT</div>
          <div style={{fontSize:26,fontWeight:700,color:"#fff",fontFamily:"Georgia,serif",marginBottom:2}}>Diagnostic & Repair Hub</div>
          <div style={{fontSize:11,color:"#3a3a3a",marginBottom:18,letterSpacing:2}}>OBD · TORQUE · FLUIDS · PARTS · TOOLS · VIN</div>
          <div style={{display:"flex",borderTop:"1px solid #1a1a1a",overflowX:"auto"}}>
            {TABS.map((t,i)=>(
              <button key={i} onClick={()=>setTab(i)} style={{background:"none",border:"none",cursor:"pointer",padding:"11px 14px",fontFamily:"monospace",fontSize:10,letterSpacing:2,fontWeight:700,color:tab===i?A:"#4a4a4a",borderTop:tab===i?`2px solid ${A}`:"2px solid transparent",marginTop:-1,transition:"color 0.15s",whiteSpace:"nowrap"}}>
                {t.l}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div style={{maxWidth:960,margin:"0 auto",padding:"26px 24px 60px"}}><Active/></div>
      <div style={{borderTop:"1px solid #111",padding:"14px 24px",textAlign:"center"}}>
        <div style={{fontSize:10,color:"#252525",letterSpacing:2}}>FOR REFERENCE ONLY · VERIFY WITH FACTORY SERVICE MANUAL · CONSULT A QUALIFIED TECHNICIAN</div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
